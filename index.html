<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <div class="balance">
        <h3>Balance: ₹ <span id="balance">0</span></h3>
        <p>Income: ₹ <span id="income">0</span></p>
        <p>Expense: ₹ <span id="expense">0</span></p>
    </div>

    <h3>Add Transaction</h3>
    <input type="text" id="text" placeholder="Enter description">
    <input type="number" id="amount" placeholder="Enter amount (+income, -expense)">
    <button onclick="addTransaction()">Add</button>

    <h3>History</h3>
    <ul id="list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
